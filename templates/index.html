<!DOCTYPE html>
<html>
<head>
    <title>Security Log Analyzer</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 🌌 Animated Cyber Background */
        body {
            margin: 0;
            overflow-x: hidden;
            background: black;
            color: white;
        }

        /* Moving grid effect */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px),
                        linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 10s linear infinite;
            z-index: -1;
        }

        @keyframes moveGrid {
            from { transform: translate(0, 0); }
            to { transform: translate(-40px, -40px); }
        }

        /* Glow card */
        .card {
            background: rgba(255, 255, 255, 0.05) !important;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }

        /* Neon heading */
        h1 {
            color: #00ffe5;
            text-shadow: 0 0 10px #00ffe5, 0 0 20px #00ffe5;
        }

        /* Button glow */
        .btn {
            border: 2px solid #00ffe5 !important;
            color: #00ffe5 !important;
            background: transparent !important;
        }

        .btn:hover {
            background: #00ffe5 !important;
            color: black !important;
            box-shadow: 0 0 15px #00ffe5;
        }
    </style>
</head>

<body>

<!-- 🌌 Background Layer -->
<div class="bg-animation"></div>

<div class="container mt-5 text-center">

    <!-- 🔐 Heading -->
    <h1 class="mb-4">🔐 Security Log Analyzer</h1>

    <!-- 📂 Upload Form -->
    <div class="card p-4">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="logfile" class="form-control mb-3" required>
            <button class="btn">Analyze Log</button>
        </form>
    </div>

    {% if results %}
    <div class="mt-5">

        <h3 class="mb-3">📊 Failed Login Attempts</h3>

        <div class="table-responsive">
            <table class="table text-white">
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Attempts</th>
                    </tr>
                </thead>

                <tbody>
                {% for ip, count in results.items() %}
                    <tr>
                        <td>{{ ip }}</td>
                        <td class="
                            {% if count >= 5 %} high-risk
                            {% elif count >= 3 %} medium-risk
                            {% endif %}
                        ">
                            {{ count }}
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mt-4">
            <canvas id="chart"></canvas>
        </div>

    </div>

    <script>
        const labels = {{ labels | tojson }};
        const data = {{ values | tojson }};

        new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Failed Attempts',
                    data: data
                }]
            }
        });
    </script>

    {% endif %}

</div>

</body>
</html>
